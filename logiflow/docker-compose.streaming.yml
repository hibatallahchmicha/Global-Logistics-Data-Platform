# MVP 4 — Real-Time Streaming Services
# Run with: docker compose -f docker-compose.yml -f docker-compose.streaming.yml up -d
# Requires the core stack (docker-compose.yml) to already be running.

services:

  # ── Kafka (KRaft — no Zookeeper needed) ─────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7.0
    container_name: logiflow_kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Kafka UI ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logiflow_kafka_ui
    environment:
      KAFKA_CLUSTERS_0_NAME: logiflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Master ─────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.3
    container_name: logiflow_spark_master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8082:8080"
    networks:
      - logiflow_net
    restart: unless-stopped

  # ── Spark Worker ─────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.5.3
    container_name: logiflow_spark_worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: "2"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    networks:
      - logiflow_net
    depends_on:
      - spark-master
    restart: unless-stopped

  # ── Kafka Producer ────────────────────────────────────────────────────────
  shipment-producer:
    build:
      context: ./mvp4-streaming
      dockerfile: Dockerfile.producer
    container_name: logiflow_shipment_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: shipment_events
      EVENTS_PER_SECOND: "1"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Streaming Job ───────────────────────────────────────────────────
  spark-streaming:
    build:
      context: ./mvp4-streaming
      dockerfile: Dockerfile.spark_job
    container_name: logiflow_spark_streaming
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: shipment_events
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPARK_TRIGGER_INTERVAL: "10 seconds"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
    restart: unless-stopped

networks:
  logiflow_net:
    external: true    # reuse the network created by docker-compose.yml

volumes:
  kafka_data:
