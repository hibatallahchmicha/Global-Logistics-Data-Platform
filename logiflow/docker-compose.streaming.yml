# MVP 4 — Real-Time Streaming Services
# Run with: docker compose -f docker-compose.yml -f docker-compose.streaming.yml up -d
# Requires the core stack (docker-compose.yml) to already be running.

services:

  # ── Kafka (official Apache Kafka, single-node KRaft) ───────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: logiflow_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Kafka UI (optional helper UI; not required for MVP completion) ──────
  kafka-ui:
    profiles: ["ui"]
    image: provectuslabs/kafka-ui:latest
    container_name: logiflow_kafka_ui
    environment:
      KAFKA_CLUSTERS_0_NAME: logiflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Master ─────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: logiflow_spark_master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"
      - "8082:8080"
    networks:
      - logiflow_net
    restart: unless-stopped

  # ── Spark Worker ─────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: logiflow_spark_worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    networks:
      - logiflow_net
    depends_on:
      - spark-master
    restart: unless-stopped

  # ── Kafka Producer ────────────────────────────────────────────────────────
  shipment-producer:
    build:
      context: ./mvp4-streaming
      dockerfile: Dockerfile.producer
    container_name: logiflow_shipment_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: shipment_events
      EVENTS_PER_SECOND: "1"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Streaming Job ───────────────────────────────────────────────────
  spark-streaming:
    build:
      context: ./mvp4-streaming
      dockerfile: Dockerfile.spark_job
    container_name: logiflow_spark_streaming
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: shipment_events
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPARK_TRIGGER_INTERVAL: "10 seconds"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
    restart: unless-stopped

networks:
  logiflow_net:
    driver: bridge

volumes:
  kafka_data:
