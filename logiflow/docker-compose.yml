services:
  postgres:
    image: postgres:15
    container_name: logiflow_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mvp1-data-pipeline/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: logiflow_minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    image: apache/airflow:2.8.0-python3.11
    container_name: logiflow_airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./mvp3-advanced/3C-airflow-orchestration/dags:/opt/airflow/dags
      - ./mvp3-advanced/3C-airflow-orchestration/entrypoint.sh:/entrypoint.sh
      - ./logs/airflow:/opt/airflow/logs
      - .:/opt/airflow/project
    networks:
      - logiflow_net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: bash /entrypoint.sh
    restart: unless-stopped

  # ── MVP 4: Kafka (KRaft — no Zookeeper needed) ──────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: logiflow_kafka
    environment:
      # KRaft mode — single broker acting as both controller and broker
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Two listeners: INTERNAL for containers, EXTERNAL for host access
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    ports:
      - "9094:9094"    # host access on 9094; internal traffic stays on 9092
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Kafka UI (monitor topics, consumers, messages) ───────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logiflow_kafka_ui
    environment:
      KAFKA_CLUSTERS_0_NAME: logiflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Master ─────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: logiflow_spark_master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "7077:7077"    # Spark submit port
      - "8082:8080"    # Spark Master Web UI (8080 is taken by Airflow)
    networks:
      - logiflow_net
    restart: unless-stopped

  # ── Spark Worker ─────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.5
    container_name: logiflow_spark_worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: "2"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    networks:
      - logiflow_net
    depends_on:
      - spark-master
    restart: unless-stopped

  # ── Kafka Producer (shipment event generator) ────────────────────────────
  shipment-producer:
    build:
      context: ./mvp4-streaming
      dockerfile: Dockerfile.producer
    container_name: logiflow_shipment_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: shipment_events
      EVENTS_PER_SECOND: "1"    # raise to increase throughput
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Streaming Job (Kafka → PostgreSQL) ─────────────────────────────
  spark-streaming:
    build:
      context: ./mvp4-streaming
      dockerfile: Dockerfile.spark_job
    container_name: logiflow_spark_streaming
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: shipment_events
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPARK_TRIGGER_INTERVAL: "10 seconds"
    networks:
      - logiflow_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
    restart: unless-stopped

networks:
  logiflow_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  kafka_data: