services:
  postgres:
    image: postgres:15
    container_name: logiflow_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mvp1-data-pipeline/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: logiflow_minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.8.0-python3.11
    container_name: logiflow_airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: logiflow_secret_key_2026
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8080:8080"
    volumes:
      - ./mvp3-advanced/3C-airflow-orchestration/dags:/opt/airflow/dags
      - ./mvp3-advanced/3C-airflow-orchestration/entrypoint.sh:/entrypoint.sh
      - ./logs/airflow:/opt/airflow/logs
      - .:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
    command: bash /entrypoint.sh
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: