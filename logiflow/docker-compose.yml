services:
  postgres:
    image: postgres:15
    container_name: logiflow_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mvp1-data-pipeline/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: logiflow_minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - logiflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    image: apache/airflow:2.8.0-python3.11
    container_name: logiflow_airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./mvp3-advanced/3C-airflow-orchestration/dags:/opt/airflow/dags
      - ./mvp3-advanced/3C-airflow-orchestration/entrypoint.sh:/entrypoint.sh
      - ./logs/airflow:/opt/airflow/logs
      - .:/opt/airflow/project
    networks:
      - logiflow_net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: bash /entrypoint.sh
    restart: unless-stopped

  # ── MVP 3: REST API + ML Prediction ──────────────────────────────────────
  api:
    build:
      context: ./mvp2-analytics-layer/2D-api
      dockerfile: Dockerfile
    container_name: logiflow_api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MODEL_PATH: /app/mvp3-advanced/3A-ml-prediction/models/delay_predictor.pkl
    volumes:
      # Mount ML module so predict.py and the trained model are accessible
      - ./mvp3-advanced/3A-ml-prediction:/app/mvp3-advanced/3A-ml-prediction:ro
    ports:
      - "8000:8000"
    networks:
      - logiflow_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  logiflow_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data: